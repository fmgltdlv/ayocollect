name = "ayocollect"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "ayocollect-db"
database_id = "d1d567d9-a127-43f4-be24-1dd370928b48"

[triggers]
crons = ["0 * * * *", "*/5 * * * *"]

[observability]
enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 1

# Public URL of this Worker — needed for cron/auto-fetch jobs to chain in the background.
# Example: https://811-ticket-serverless.<your-subdomain>.workers.dev
[vars]
WORKER_URL = "https://ayocollect.thefieldmappinggroup.workers.dev"
# Dedicated scraper pushes batches to /api/ingest/* — keep Worker scraping off by default.
ENABLE_WORKER_SCRAPING = "false"
SCRAPER_WORKER_URL = "https://ayocollect-scraper.thefieldmappinggroup.workers.dev"

[[secrets_store_secrets]]
binding = "INGEST_SECRET"
store_id = "ce24acd5fbfa4bb09a002d09c3645dc0"
secret_name = "INGEST_SECRET"
