name = "ayocollect"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[routes]]
pattern = "811viewapi.ayowerks.com"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "ayocollect-db"
database_id = "d1d567d9-a127-43f4-be24-1dd370928b48"

[triggers]
crons = ["0 * * * *", "*/5 * * * *"]

[observability]
enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 1

# Public URLs (custom domains on ayowerks.com)
[vars]
WORKER_URL = "https://811viewapi.ayowerks.com"
# Dedicated scraper pushes batches to /api/ingest/* — keep Worker scraping off by default.
ENABLE_WORKER_SCRAPING = "false"
SCRAPER_WORKER_URL = "https://811scrape.ayowerks.com"
GOOGLE_CLIENT_ID = "773088173323-5csuju63707n0ff3hk3barsko4mupqv2.apps.googleusercontent.com"
ALLOWED_EMAIL_DOMAIN = "aspadeco.com"
ADMIN_EMAILS = "charles@aspadeco.com"

[[secrets_store_secrets]]
binding = "INGEST_SECRET"
store_id = "ce24acd5fbfa4bb09a002d09c3645dc0"
secret_name = "INGEST_SECRET"
