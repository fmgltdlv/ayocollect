name = "ayocollect-scraper"
main = "src/index.ts"
compatibility_date = "2026-07-02"

[[routes]]
pattern = "811scrape.ayowerks.com"
custom_domain = true

# Daily scrape at 14:00 UTC (~7am PT)
[triggers]
crons = ["0 14 * * *"]

[observability]
enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 1

[vars]
WORKER_URL = "https://811viewapi.ayowerks.com"
SYSTEMS = "digalert,usan-ca,usan-nv"
[[containers]]
class_name = "ScraperContainer"
image = "./Dockerfile"
instance_type = "lite"
max_instances = 1

[[durable_objects.bindings]]
name = "SCRAPER"
class_name = "ScraperContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ScraperContainer"]

[[secrets_store_secrets]]
binding = "INGEST_SECRET"
store_id = "ce24acd5fbfa4bb09a002d09c3645dc0"
secret_name = "INGEST_SECRET"
