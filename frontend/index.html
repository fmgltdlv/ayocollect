<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>811 Ticket Analytics</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="header">
    <h1>811 Ticket Analytics</h1>
    <div class="header-actions">
      <button id="feedback-btn" class="btn-secondary btn-sm hidden" type="button">Feedback</button>
      <div id="auth-area"></div>
    </div>
  </header>

  <div id="stopped-banner" class="banner hidden">Fetching stopped — start a new job to resume.</div>

  <nav class="tabs">
    <button data-view="browse" class="tab active">Browse</button>
    <button data-view="analytics" class="tab">Analytics</button>
    <button data-view="fetch" class="tab admin-tab hidden">Fetch</button>
    <button data-view="jobs" class="tab admin-tab hidden">Jobs</button>
    <button data-view="admin" class="tab admin-tab hidden">Admin</button>
  </nav>

  <main id="app"></main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <script src="/config.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
